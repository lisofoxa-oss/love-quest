<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Love Quest 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700;800&family=Impact&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0a1a;--card-bg:#1a1228;
  --accent:#e8a87c;--accent2:#d4789c;--gold:#f5d680;
  --text:#f0e6d8;--text-dim:#9a8fb0;--radius:18px;
}
html,body{
  min-height:100dvh;font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
}
body{background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(212,120,156,.12)0,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(232,168,124,.10)0,transparent 60%),var(--bg)}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;opacity:0}
@keyframes twinkle{from{opacity:.1}to{opacity:var(--mo,.7)}}

/* Screens */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:10;opacity:0;pointer-events:none;transition:opacity .5s ease}
.screen.active{opacity:1;pointer-events:auto}

/* Splash */
#splash .title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:var(--gold);text-align:center;margin-bottom:8px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
#splash .sub{font-size:1rem;color:var(--text-dim);text-align:center;margin-bottom:40px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 4px 20px rgba(212,120,156,.3)}
.btn-primary:active{transform:scale(.96)}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text)}

/* Map */
#mapScreen{justify-content:flex-start;padding-top:32px;overflow-y:auto}
.map-header{text-align:center;margin-bottom:8px}
.map-header h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold)}
.hearts-bar{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:20px;font-size:.85rem;color:var(--text-dim)}
.hearts-bar .h-icon{font-size:1.1rem}

.map-path{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;max-width:340px;padding-bottom:40px}
.map-node{position:relative;display:flex;align-items:center;gap:14px;width:100%;padding:12px 0;cursor:pointer;transition:all .3s}
.map-node.locked{opacity:.35;pointer-events:none}
.map-node.current .node-circle{animation:glowPulse 1.5s ease-in-out infinite;box-shadow:0 0 20px rgba(245,214,128,.4)}
@keyframes glowPulse{0%,100%{box-shadow:0 0 15px rgba(245,214,128,.3)}50%{box-shadow:0 0 30px rgba(245,214,128,.6)}}

.node-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;background:var(--card-bg);border:2px solid rgba(255,255,255,.08);transition:all .3s}
.map-node.done .node-circle{border-color:rgba(245,214,128,.4);background:rgba(245,214,128,.08)}
.map-node.current .node-circle{border-color:var(--gold)}
.node-info{flex:1}
.node-title{font-size:.92rem;font-weight:700;color:var(--text)}
.node-sub{font-size:.72rem;color:var(--text-dim)}
.map-node.done .node-sub{color:rgba(245,214,128,.5)}
.node-check{font-size:1.1rem;flex-shrink:0}
.map-line{width:2px;height:20px;background:rgba(255,255,255,.06);margin-left:25px}
.map-node.done+.map-line{background:rgba(245,214,128,.2)}

/* Intro */
#introScreen .intro-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn .6s ease-out}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
#introScreen .intro-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold);margin-bottom:8px;text-align:center}
#introScreen .intro-sub{font-size:.9rem;color:var(--text-dim);margin-bottom:32px;text-align:center}

/* Game area */
#gameScreen{padding:0;justify-content:flex-start}
.game-hud{position:absolute;top:0;left:0;right:0;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;z-index:20}
.game-hud .hud-label{font-size:.78rem;color:var(--text-dim)}
.game-hud .hud-value{font-size:1.1rem;font-weight:800;color:var(--gold)}
.game-progress{position:absolute;top:54px;left:20px;right:20px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;z-index:20;overflow:hidden}
.game-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));border-radius:2px;transition:width .3s ease}

#gameCanvas{width:100%;height:100%;display:block;touch-action:none}
#gameDOM{position:absolute;inset:0;display:none}

/* Memory game */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:70px 16px 20px;width:100%;max-width:400px;margin:0 auto}
.memory-card{aspect-ratio:3/4;border-radius:12px;cursor:pointer;perspective:600px;-webkit-perspective:600px}
.memory-card-inner{position:relative;width:100%;height:100%;transition:transform .4s ease;transform-style:preserve-3d;-webkit-transform-style:preserve-3d}
.memory-card.flipped .memory-card-inner{transform:rotateY(180deg)}
.memory-card-front,.memory-card-back{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.memory-card-front{background:var(--card-bg);border:1px solid rgba(255,255,255,.08);font-size:1.5rem;color:rgba(255,255,255,.15)}
.memory-card-back{background:rgba(245,214,128,.08);border:1px solid rgba(245,214,128,.2);transform:rotateY(180deg);font-size:2rem}
.memory-card.matched .memory-card-back{background:rgba(100,200,100,.1);border-color:rgba(100,200,100,.3)}

/* Puzzle game */
.puzzle-wrap{padding:70px 16px 20px;width:100%;max-width:360px;margin:0 auto}
.puzzle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;aspect-ratio:1}
.puzzle-cell{border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all .2s;border:2px solid transparent}
.puzzle-cell.filled{background:rgba(212,120,156,.12);border-color:rgba(212,120,156,.25)}
.puzzle-cell.empty{background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.1)}
.puzzle-cell.selected{border-color:var(--gold)!important;box-shadow:0 0 15px rgba(245,214,128,.3)}
.puzzle-cell.correct{background:rgba(100,200,100,.1);border-color:rgba(100,200,100,.3)}
.puzzle-hint{text-align:center;font-size:.8rem;color:var(--text-dim);margin-top:12px}

/* Message */
#msgScreen{padding:20px}
.msg-card{background:var(--card-bg);border:1px solid rgba(245,214,128,.12);border-radius:24px;padding:28px 22px;max-width:400px;width:100%;text-align:center;animation:msgIn .6s cubic-bezier(.22,1,.36,1)}
@keyframes msgIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}
.msg-emoji{font-size:2.4rem;margin-bottom:12px}
.msg-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--gold);margin-bottom:16px}
.msg-text{font-size:.92rem;line-height:1.7;color:var(--text);margin-bottom:24px;text-align:left;white-space:pre-line}
.msg-heart{display:inline-block;font-size:1.2rem;margin-bottom:16px;animation:heartBeat 1s ease-in-out infinite}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}

/* Gopnik theme override */
.gopnik{font-family:Impact,'Nunito',sans-serif!important;letter-spacing:.02em}
.gopnik-bg{background:#1a1a1a!important}
.gopnik .msg-text{font-family:'Nunito',sans-serif}

/* Final */
#finalScreen{padding:20px;overflow-y:auto}
.final-content{max-width:400px;width:100%;text-align:center}
.final-content .msg-text{text-align:center}
.cat-img{max-width:320px;width:100%;border-radius:20px;margin:20px auto;box-shadow:0 8px 40px rgba(0,0,0,.4);animation:catIn .8s ease-out}
@keyframes catIn{from{opacity:0;transform:scale(.85) rotate(-3deg)}to{opacity:1;transform:none}}

/* Particles */
.particle-container{position:fixed;inset:0;pointer-events:none;z-index:200}
.particle{position:absolute;border-radius:50%;animation:particleUp .8s ease-out forwards}
@keyframes particleUp{0%{transform:scale(0) translate(0,0);opacity:1}100%{transform:scale(1) translate(var(--tx),var(--ty));opacity:0}}

/* Responsive */
@media(max-width:360px){
  #splash .title{font-size:2.2rem}
  .msg-text{font-size:.85rem}
  .memory-grid{gap:6px;padding:70px 10px 16px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="particle-container" id="particles"></div>

<!-- SPLASH -->
<div class="screen active" id="splash">
  <div class="title">Love Quest 💖</div>
  <div class="sub">Путешествие по уровням<br>с сюрпризами внутри</div>
  <button class="btn btn-primary" onclick="goToMap()">Начать путешествие ✨</button>
</div>

<!-- MAP -->
<div class="screen" id="mapScreen">
  <div class="map-header"><h2>Карта путешествия</h2></div>
  <div class="hearts-bar">
    <span class="h-icon" id="heartIcons"></span>
    <span id="heartCount">0 / 8 фрагментов сердца</span>
  </div>
  <div class="map-path" id="mapPath"></div>
</div>

<!-- INTRO -->
<div class="screen" id="introScreen">
  <div class="intro-emoji" id="introEmoji"></div>
  <div class="intro-title" id="introTitle"></div>
  <div class="intro-sub" id="introSub"></div>
  <button class="btn btn-primary" onclick="startGame()">Играть ▶</button>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <div class="game-hud">
    <div><div class="hud-label" id="hudLabel">Собрано</div><div class="hud-value" id="hudValue">0 / 10</div></div>
    <div style="text-align:right"><div class="hud-label" id="hudLevelLabel">Уровень 1</div><div class="hud-value" id="hudLevelEmoji">🌸</div></div>
  </div>
  <div class="game-progress"><div class="game-progress-fill" id="gameProgressFill"></div></div>
  <canvas id="gameCanvas"></canvas>
  <div id="gameDOM"></div>
</div>

<!-- MESSAGE -->
<div class="screen" id="msgScreen">
  <div class="msg-card" id="msgCard">
    <div class="msg-emoji" id="msgEmoji"></div>
    <div class="msg-title" id="msgTitle"></div>
    <div class="msg-heart" id="msgHeart">💖</div>
    <div class="msg-text" id="msgText"></div>
    <button class="btn btn-primary" id="msgBtn" onclick="afterMessage()">Дальше →</button>
  </div>
</div>

<!-- FINAL -->
<div class="screen" id="finalScreen">
  <div class="final-content">
    <div class="msg-emoji">👑</div>
    <div class="msg-title" style="font-size:1.5rem;margin-bottom:16px">Алиса, ты прошла всё!</div>
    <div class="msg-text" style="text-align:center" id="finalText"></div>
    <img src="cat.jpg" class="cat-img" alt="котёнок" onerror="this.style.display='none'">
  </div>
</div>

<script>
// ======================================================================
// DATA
// ======================================================================
const LEVELS = [
  {
    emoji:'🌸', title:'Первое сообщение', sub:'Поймай лепестки',
    game:'catch', gameConfig:{items:[{e:'🌸',good:true},{e:'🌺',good:true},{e:'💮',good:true}],bad:[],need:10,spawnMs:600,speed:2,mode:'fall'},
    msgEmoji:'🌸', msgTitle:'Как всё началось',
    msgText:'Алиса, помнишь как всё началось? Сначала я написал тебе что-то невероятно милое, нежное, прям мур-мур такое... ты заинтересовалась, подумала «ого, какой приятный»...\n\nА потом прилетело второе сообщение — что все бабы тупые и мне просто надоело об этом писать, вот и решил для разнообразия что-то милое отправить.\n\nИ ты расцвела. Не от нежности — от ржаки. И именно в тот момент я понял: окей, эта девочка — моя волна.'
  },
  {
    emoji:'🌙', title:'Та самая ночь', sub:'Найди пары',
    game:'memory',
    msgEmoji:'🌙', msgTitle:'Помнишь ту ночь?',
    msgText:'Помнишь ту ночь? Ты была немного подшофе, я — на чистом дофамине от тебя.\n\nМы не хотели спать. Вообще. Было так тепло, так уютно, так открыто — как будто знаем друг друга годами, а не дни.\n\nА🦊, ты тогда была такая настоящая. Без фильтров. И я подумал — вот с этим человеком хочется не спать ещё много-много ночей.'
  },
  {
    emoji:'😤', title:'РАЙОН РЕШАЕТ', sub:'Лови бухло, не лови сок!',
    game:'catch', theme:'gopnik',
    gameConfig:{items:[{e:'🍷',good:true},{e:'🥂',good:true},{e:'🍺',good:true},{e:'🍾',good:true}],bad:[{e:'🧃',good:false},{e:'💧',good:false},{e:'🥛',good:false}],need:12,spawnMs:500,speed:2.5,mode:'fall'},
    msgEmoji:'😤', msgTitle:'НУ ЧЁ, А🦊',
    msgText:'Ну чё, А🦊, слушай сюда.\n\nТы ваще ахуенная, я серьёзно. Я тут тебе целый блять квест сделал, ты поняла? Другие пацаны цветы носят, а я тут сижу, код пишу, сердечки рисую, блять.\n\nТы бесценная, нахуй. Вся такая милая, общительная, рисуешь котиков, присылаешь фоточки природы, а фоточку в маечке — хуй.\n\nНо я не обижаюсь. Потому что ты — лучшее что случилось в моём телеграме. Да и вообще. Пошла ты нахуй, зая 💞'
  },
  {
    emoji:'🦋', title:'Что я в тебе вижу', sub:'Поймай бабочек',
    game:'catch', gameConfig:{items:[{e:'🦋',good:true}],bad:[],need:8,spawnMs:800,speed:1.5,mode:'flutter'},
    msgEmoji:'🦋', msgTitle:'За что я тебя ценю',
    msgText:'Алиса, знаешь за что я тебя ценю?\n\nЗа то, что ты такая собеседница — я могу резко сменить тему пять раз, а тебе всё равно есть что сказать. За то, что ты пишешь мне может даже больше, чем я тебе — а я так мечтал о человеке, который будет общаться со мной не меньше чем я с ним.\n\nЗа твои фотографии котиков и природы — я реально вижу мир твоими глазами и мне нравится. За твои рисунки — ты рисуешь таких милых котиков, что я хочу поставить их на обои.\n\nЗа то, что ты настоящая — и грустная, и злая, и радостная, и материшься, и ласкаешься. За то, что ты именно такая. Изза тебя я стал чаще улыбаться. А это, зай, бесценно.'
  },
  {
    emoji:'🌊', title:'Океан мечты', sub:'Проведи кораблик',
    game:'boat',
    msgEmoji:'🌊', msgTitle:'Мечта',
    msgText:'А🦊, я не буду врать что знаю, что нас ждёт. Не буду обещать луну и звёзды.\n\nНо знаешь чего я реально хочу? Хочу, чтобы мы вот так же мило болтали через год. И через пять. Чтобы ты так же присылала мне котиков в три часа ночи, а я так же не мог оторваться от телефона, потому что там ты.\n\nПросто продолжить. С тобой. Вот так. Каждый день. Это моя мечта — и она не такая уж нереальная, правда?'
  },
  {
    emoji:'☀️', title:'Первая весна', sub:'Поймай солнечные лучи',
    game:'catch', gameConfig:{items:[{e:'☀️',good:true},{e:'🌤️',good:true},{e:'✨',good:true}],bad:[],need:10,spawnMs:700,speed:0,mode:'flash'},
    msgEmoji:'☀️', msgTitle:'1 марта',
    msgText:'1 марта. Наша первая весна.\n\nНу, формально — общая, потому что мы оба на одной планете и весна тут одна на всех. Но мне приятнее думать что она наша.\n\nДа, ты её проспала. Я знаю. Я прощаю. Я вообще тебе всё прощу, Алиса, у тебя были уважительные причины — подушка, одеялко и возможно вино 🍷\n\nНо весна подождёт. Я тоже подожду. Ты стоишь того, чтобы ждать ☀️'
  },
  {
    emoji:'🔥', title:'Что ты со мной делаешь', sub:'Лопай сердечки ❤️ а не 💔',
    game:'catch', gameConfig:{items:[{e:'❤️',good:true},{e:'💕',good:true},{e:'💗',good:true}],bad:[{e:'💔',good:false}],need:10,spawnMs:550,speed:1.8,mode:'rise'},
    msgEmoji:'🔥', msgTitle:'Ты опасна',
    msgText:'Алиса, ну ты реально шикарная. Просто объективно.\n\nА ещё ты дразнишь меня. Постоянно. «Я в маечке», «у меня с собой две маечки», «сейчас на море в шортиках» — и ни одной фоточки! Ты знаешь что ты делаешь? Знаешь. И тебе нравится.\n\nЯ видел ту картинку, которую ИИ переделал из твоего фото. Если переделка — уже огонь, то оригинал — это вообще мечта, а не девочка.\n\nТы опасна, А🦊. И мне это нравится 🔥'
  },
  {
    emoji:'💖', title:'Собери сердце', sub:'Собери пазл из фрагментов',
    game:'puzzle',
    msgEmoji:'💖', msgTitle:'Ты собрала моё сердце',
    msgText:'Ты собрала моё сердце. Буквально.\n\nАлиса, ты — то, о чём я мечтал. Не идеальная девочка из фильма, а настоящая. Смешная, дерзкая, тёплая, иногда пьяная, всегда честная.\n\nМне с тобой так хорошо, что я хочу продолжения. Каждый день. Каждое сообщение. Каждый стикер.\n\nА теперь...',
    isFinal: true
  },
];

// ======================================================================
// STATE
// ======================================================================
let completed = JSON.parse(localStorage.getItem('lq_done') || '[]');
let currentLvl = 0;
let gameActive = false;
let gameCleanup = null;

// ======================================================================
// HELPERS
// ======================================================================
function $(id){return document.getElementById(id)}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function saveProgress(){localStorage.setItem('lq_done',JSON.stringify(completed))}
function emitParticles(x,y,colors){
  const c=$('particles');
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.left=x+'px';p.style.top=y+'px';
    p.style.width=p.style.height=(4+Math.random()*4)+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    const a=(Math.PI*2/14)*i+(Math.random()-.5);
    const d=40+Math.random()*70;
    p.style.setProperty('--tx',Math.cos(a)*d+'px');
    p.style.setProperty('--ty',Math.sin(a)*d+'px');
    c.appendChild(p);setTimeout(()=>p.remove(),800);
  }
}

// Stars
(function(){
  const c=$('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.setProperty('--dur',(1.5+Math.random()*3)+'s');
    s.style.setProperty('--mo',(0.3+Math.random()*0.5).toFixed(2));
    s.style.animationDelay=Math.random()*3+'s';
    if(Math.random()>.7){s.style.width='3px';s.style.height='3px'}
    c.appendChild(s);
  }
})();

// ======================================================================
// MAP
// ======================================================================
function goToMap(){
  renderMap();
  showScreen('mapScreen');
}
function renderMap(){
  const path=$('mapPath');path.innerHTML='';
  const nextLvl = completed.length;
  // Hearts
  let hStr='';for(let i=0;i<8;i++)hStr+=i<completed.length?'❤️':'🤍';
  $('heartIcons').textContent=hStr;
  $('heartCount').textContent=completed.length+' / 8 фрагментов сердца';

  LEVELS.forEach((lv,i)=>{
    const done=completed.includes(i);
    const isCurrent=i===nextLvl;
    const locked=i>nextLvl;

    const node=document.createElement('div');
    node.className='map-node'+(done?' done':'')+(isCurrent?' current':'')+(locked?' locked':'');
    node.innerHTML=`
      <div class="node-circle">${lv.emoji}</div>
      <div class="node-info">
        <div class="node-title">${lv.title}</div>
        <div class="node-sub">${done?'Пройдено ✓':locked?'Заблокировано':lv.sub}</div>
      </div>
      ${done?'<div class="node-check">✅</div>':''}
    `;
    node.addEventListener('click',()=>{
      if(locked)return;
      if(done){
        // Re-read message
        currentLvl=i;showMessage();
      } else {
        currentLvl=i;showIntro();
      }
    });
    path.appendChild(node);

    if(i<LEVELS.length-1){
      const line=document.createElement('div');line.className='map-line';
      path.appendChild(line);
    }
  });

  // Auto-scroll to current level
  setTimeout(()=>{
    const cur=path.querySelector('.current');
    if(cur)cur.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

// INTRO

function showIntro(){
  const lv=LEVELS[currentLvl];
  $('introEmoji').textContent=lv.emoji;
  $('introTitle').textContent=lv.title;
  $('introSub').textContent=lv.sub;
  showScreen('introScreen');
  // Apply gopnik theme
  if(lv.theme==='gopnik'){

// ======================================================================
// GAME DISPATCH
// ======================================================================
function startGame(){
  const lv=LEVELS[currentLvl];
  showScreen('gameScreen');
  $('hudLevelLabel').textContent='Уровень '+(currentLvl+1);
  $('hudLevelEmoji').textContent=lv.emoji;
  $('gameProgressFill').style.width='0%';

  // Theme
  const gs=$('gameScreen');
  gs.classList.remove('gopnik','gopnik-bg');
  if(lv.theme==='gopnik'){gs.classList.add('gopnik','gopnik-bg')}

  // Canvas vs DOM
  const canvas=$('gameCanvas');
  const dom=$('gameDOM');
  canvas.style.display='none';dom.style.display='none';dom.innerHTML='';

  if(lv.game==='catch'){
    canvas.style.display='block';
    startCatchGame(lv.gameConfig);
  }else if(lv.game==='memory'){
    dom.style.display='block';
    startMemoryGame();
  }else if(lv.game==='boat'){
    canvas.style.display='block';
    startBoatGame();
  }else if(lv.game==='puzzle'){
    dom.style.display='block';
    startPuzzleGame();
  }
}

function onGameComplete(){
  gameActive=false;
  if(gameCleanup){gameCleanup();gameCleanup=null;}
  if(!completed.includes(currentLvl)){
    completed.push(currentLvl);
    saveProgress();
  }
  emitParticles(window.innerWidth/2,window.innerHeight/2,['#f5d680','#e8a87c','#d4789c','#fff']);
  setTimeout(showMessage,600);
}

// ======================================================================
// CATCH GAME (petals, drinks, butterflies, sun, hearts)
// ======================================================================
function startCatchGame(cfg){
  const canvas=$('gameCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  let W,H;
  function resize(){
    W=canvas.clientWidth;H=canvas.clientHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();

  const allItems=[...cfg.items,...(cfg.bad||[])];
  let objects=[];
  let score=0;
  const need=cfg.need;
  gameActive=true;
  let spawnTimer=0;
  let lastTime=0;
  let animId;

  $('hudLabel').textContent='Собрано';
  $('hudValue').textContent='0 / '+need;
  $('gameProgressFill').style.width='0%';

  function spawn(){
    const isBad=cfg.bad&&cfg.bad.length>0&&Math.random()<0.25;
    const pool=isBad?cfg.bad:cfg.items;
    const item=pool[Math.floor(Math.random()*pool.length)];
    const size=36+Math.random()*12;
    const obj={
      x:20+Math.random()*(W-40),
      y:cfg.mode==='rise'?H+size : cfg.mode==='flash'?40+Math.random()*(H-160) : -size,
      size, emoji:item.e, good:item.good!==false,
      vx:(Math.random()-.5)*0.5,
      vy:cfg.speed*(0.8+Math.random()*0.4)*(cfg.mode==='rise'?-1:1),
      life:cfg.mode==='flash'?2:99,
      alpha:1,
      wobble:Math.random()*Math.PI*2,
    };
    if(cfg.mode==='flutter'){
      obj.y=40+Math.random()*(H-160);
      obj.vx=(Math.random()-.5)*2;
      obj.vy=(Math.random()-.5)*1.5;
    }
    if(cfg.mode==='flash'){
      obj.vx=0;obj.vy=0;
    }
    objects.push(obj);
  }

  function update(dt){
    spawnTimer+=dt;
    if(spawnTimer>cfg.spawnMs/1000){
      spawnTimer=0;spawn();
    }
    objects.forEach(o=>{
      if(cfg.mode==='flutter'){
        o.wobble+=dt*3;
        o.x+=o.vx+Math.sin(o.wobble)*1.5;
        o.y+=o.vy+Math.cos(o.wobble*0.7)*1;
        if(o.x<0)o.vx=Math.abs(o.vx);
        if(o.x>W)o.vx=-Math.abs(o.vx);
        if(o.y<40)o.vy=Math.abs(o.vy);
        if(o.y>H-40)o.vy=-Math.abs(o.vy);
      } else if(cfg.mode==='flash'){
        o.life-=dt;
        o.alpha=Math.max(0,o.life/2);
      } else {
        o.wobble+=dt*2;
        o.x+=Math.sin(o.wobble)*0.8;
        o.y+=o.vy;
      }
    });
    objects=objects.filter(o=>{
      if(cfg.mode==='flash')return o.life>0&&o.alpha>0;
      if(cfg.mode==='rise')return o.y>-60;
      return o.y<H+60;
    });
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    objects.forEach(o=>{
      ctx.globalAlpha=o.alpha||1;
      ctx.font=o.size+'px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(o.emoji,o.x,o.y);
    });
    ctx.globalAlpha=1;
  }

  function loop(time){
    if(!gameActive){return}
    const dt=lastTime?Math.min((time-lastTime)/1000,0.1):0.016;
    lastTime=time;
    update(dt);render();
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);

  function handleTap(ex,ey){
    for(let i=objects.length-1;i>=0;i--){
      const o=objects[i];
      const dx=ex-o.x,dy=ey-o.y;
      if(Math.sqrt(dx*dx+dy*dy)<o.size*0.8){
        if(o.good){
          score++;
          emitParticles(ex,ey,['#f5d680','#e8a87c','#fff']);
          $('hudValue').textContent=score+' / '+need;
          $('gameProgressFill').style.width=(score/need*100)+'%';
          if(score>=need){
            gameActive=false;
            setTimeout(onGameComplete,300);
          }
        } else {
          score=Math.max(0,score-1);
          $('hudValue').textContent=score+' / '+need;
          $('gameProgressFill').style.width=(score/need*100)+'%';
          // Shake effect
          canvas.style.transition='none';
          canvas.style.transform='translateX(8px)';
          setTimeout(()=>{canvas.style.transform='translateX(-8px)'},50);
          setTimeout(()=>{canvas.style.transform='';canvas.style.transition=''},100);
        }
        objects.splice(i,1);
        return;
      }
    }
  }

  function onTouch(e){
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    handleTap(t.clientX-r.left,t.clientY-r.top);
  }
  canvas.addEventListener('touchstart',onTouch,{passive:false});
  canvas.addEventListener('mousedown',onTouch);

  gameCleanup=()=>{
    cancelAnimationFrame(animId);
    canvas.removeEventListener('touchstart',onTouch);
    canvas.removeEventListener('mousedown',onTouch);
    objects=[];
  };
}

// ======================================================================
// MEMORY GAME
// ======================================================================
function startMemoryGame(){
  const dom=$('gameDOM');
  const emojis=['🌙','🍷','💬','🔥','💫','😴'];
  let deck=[...emojis,...emojis];
  // Shuffle
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}

  $('hudLabel').textContent='Пары';
  $('hudValue').textContent='0 / 6';
  $('gameProgressFill').style.width='0%';

  const grid=document.createElement('div');grid.className='memory-grid';
  let flipped=[];let matched=0;let busy=false;
  gameActive=true;

  deck.forEach((emoji,i)=>{
    const card=document.createElement('div');card.className='memory-card';
    card.innerHTML=`<div class="memory-card-inner"><div class="memory-card-front">?</div><div class="memory-card-back">${emoji}</div></div>`;
    card.dataset.emoji=emoji;card.dataset.idx=i;
    card.addEventListener('click',()=>{
      if(busy||card.classList.contains('flipped')||card.classList.contains('matched'))return;
      card.classList.add('flipped');
      flipped.push(card);
      if(flipped.length===2){
        busy=true;
        const[a,b]=flipped;
        if(a.dataset.emoji===b.dataset.emoji){
          matched++;
          a.classList.add('matched');b.classList.add('matched');
          $('hudValue').textContent=matched+' / 6';
          $('gameProgressFill').style.width=(matched/6*100)+'%';
          emitParticles(window.innerWidth/2,window.innerHeight/2,['#f5d680','#d4789c']);
          flipped=[];busy=false;
          if(matched===6){gameActive=false;setTimeout(onGameComplete,500)}
        }else{
          setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];busy=false},800);
        }
      }
    });
    grid.appendChild(card);
  });
  dom.appendChild(grid);
  gameCleanup=()=>{dom.innerHTML=''};
}

// ======================================================================
// BOAT GAME
// ======================================================================
function startBoatGame(){
  const canvas=$('gameCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  let W,H;
  function resize(){W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
  resize();

  let boatX=W/2;const boatY=H-80;const boatSize=40;
  let waves=[];let survived=0;const surviveTime=15;
  let touchX=null;gameActive=true;let lastTime=0;let animId;
  let spawnTimer=0;

  $('hudLabel').textContent='Продержись';
  $('hudValue').textContent='0 / '+surviveTime+'с';
  $('gameProgressFill').style.width='0%';

  function spawnWave(){
    const fromLeft=Math.random()>.5;
    waves.push({
      x:fromLeft?-40:W+40,
      y:100+Math.random()*(H-200),
      vx:(fromLeft?1:-1)*(2+Math.random()*2),
      size:30+Math.random()*15,
      emoji:['🌊','💨','🌀'][Math.floor(Math.random()*3)]
    });
  }

  function update(dt){
    survived+=dt;
    spawnTimer+=dt;
    if(spawnTimer>0.6){spawnTimer=0;spawnWave()}
    if(touchX!==null){
      const target=touchX;
      boatX+=(target-boatX)*0.12;
    }
    boatX=Math.max(20,Math.min(W-20,boatX));
    waves.forEach(w=>{w.x+=w.vx});
    waves=waves.filter(w=>w.x>-60&&w.x<W+60);
    // Collision — just shake, no penalty
    waves.forEach(w=>{
      const dx=w.x-boatX,dy=w.y-boatY;
      if(Math.sqrt(dx*dx+dy*dy)<(boatSize+w.size)*0.5){
        w.x=9999; // remove
        canvas.style.transition='none';
        canvas.style.transform='translateX(6px)';
        setTimeout(()=>{canvas.style.transform='translateX(-6px)'},40);
        setTimeout(()=>{canvas.style.transform=''},80);
      }
    });

    const t=Math.min(survived,surviveTime);
    $('hudValue').textContent=Math.floor(t)+' / '+surviveTime+'с';
    $('gameProgressFill').style.width=(t/surviveTime*100)+'%';

    if(survived>=surviveTime){
      gameActive=false;setTimeout(onGameComplete,300);
    }
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    // Water bg
    ctx.fillStyle='rgba(30,60,120,0.15)';ctx.fillRect(0,0,W,H);
    // Waves
    waves.forEach(w=>{ctx.font=w.size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(w.emoji,w.x,w.y)});
    // Boat
    ctx.font=boatSize+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⛵',boatX,boatY);
  }

  function loop(time){
    if(!gameActive)return;
    const dt=lastTime?Math.min((time-lastTime)/1000,0.1):0.016;lastTime=time;
    update(dt);render();animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);

  function onTouchStart(e){e.preventDefault();const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;touchX=t.clientX-r.left}
  function onTouchMove(e){e.preventDefault();const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;touchX=t.clientX-r.left}
  function onTouchEnd(){touchX=null}

  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd);
  canvas.addEventListener('mousedown',onTouchStart);
  canvas.addEventListener('mousemove',e=>{if(e.buttons)onTouchMove(e)});
  canvas.addEventListener('mouseup',onTouchEnd);

  gameCleanup=()=>{
    cancelAnimationFrame(animId);
    canvas.removeEventListener('touchstart',onTouchStart);
    canvas.removeEventListener('touchmove',onTouchMove);
    canvas.removeEventListener('touchend',onTouchEnd);
    canvas.removeEventListener('mousedown',onTouchStart);
    canvas.removeEventListener('mouseup',onTouchEnd);
  };
}

// ======================================================================
// PUZZLE GAME
// ======================================================================
function startPuzzleGame(){
  const dom=$('gameDOM');
  // Heart pieces as emoji
  const pieces=['❤️','💕','💗','💖','💘','💝','💓','💞','💟'];
  const solution=[...pieces];
  let current=[...pieces];
  // Shuffle until not solved
  do{for(let i=current.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[current[i],current[j]]=[current[j],current[i]]}}
  while(current.every((p,i)=>p===solution[i]));

  $('hudLabel').textContent='Пазл';
  $('hudValue').textContent='Собери ❤️';
  $('gameProgressFill').style.width='0%';
  gameActive=true;

  const wrap=document.createElement('div');wrap.className='puzzle-wrap';
  const grid=document.createElement('div');grid.className='puzzle-grid';
  const hint=document.createElement('div');hint.className='puzzle-hint';
  hint.textContent='Нажми на две ячейки, чтобы поменять их местами';

  let selected=null;
  let correctCount=0;

  function renderPuzzle(){
    grid.innerHTML='';
    correctCount=0;
    current.forEach((emoji,i)=>{
      const cell=document.createElement('div');
      cell.className='puzzle-cell filled';
      if(emoji===solution[i]){cell.classList.add('correct');correctCount++}
      cell.textContent=emoji;
      cell.addEventListener('click',()=>{
        if(selected===null){
          selected=i;cell.classList.add('selected');
        }else if(selected===i){
          selected=null;cell.classList.remove('selected');
        }else{
          [current[selected],current[i]]=[current[i],current[selected]];
          selected=null;renderPuzzle();
          if(correctCount===9){
            gameActive=false;
            setTimeout(onGameComplete,500);
          }
        }
      });
      grid.appendChild(cell);
    });
    $('gameProgressFill').style.width=(correctCount/9*100)+'%';
  }

  renderPuzzle();
  wrap.appendChild(grid);wrap.appendChild(hint);dom.appendChild(wrap);
  gameCleanup=()=>{dom.innerHTML=''};
}

  }else{

  }
}
